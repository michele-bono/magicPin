<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="mark" src="../../icons/magicpin.svg" alt="" width="22" height="22" />
        <h1>magicPin</h1>
      </div>
      <label class="toggle" title="Pause saving on this device">
        <input type="checkbox" id="pause" />
        <span class="knob" aria-hidden="true"></span>
        <span class="toggle-label">pause</span>
      </label>
    </header>
    <div id="sources"></div>
    <div class="actions">
      <div class="snaprow">
        <input id="snapname" placeholder="Name a snapshot…" maxlength="40" />
        <button id="snapsave" title="Save the current pinned tabs as a named snapshot">
          Save
        </button>
      </div>
      <button id="undo" hidden></button>
      <button id="sync">Sync now</button>
      <div class="iorow">
        <button id="export" title="Download all sets and snapshots as a JSON backup">
          ↓ Export
        </button>
        <button id="import" title="Import a backup file — its sets become snapshots">
          ↑ Import
        </button>
        <input id="importfile" type="file" accept=".json,application/json" hidden />
      </div>
    </div>
    <footer>
      <div id="error" hidden></div>
      <div id="status"></div>
      <div class="quota-line">
        <span id="quota"></span>
        <div id="quotabar"><i></i></div>
      </div>
    </footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
