<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>magicPin</h1>
      <label class="toggle">
        <input type="checkbox" id="pause" />
        Pause sync on this device
      </label>
    </header>
    <ul id="pins"></ul>
    <div class="actions">
      <button id="apply">Replace pinned tabs with synced set</button>
    </div>
    <footer id="status"></footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
