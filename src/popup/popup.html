<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>magicPin</h1>
      <label class="toggle">
        <input type="checkbox" id="pause" />
        Pause saving on this device
      </label>
    </header>
    <div id="sources"></div>
    <div class="actions">
      <div class="snaprow">
        <input id="snapname" placeholder="Snapshot name" maxlength="40" />
        <button id="snapsave" title="Save the current pinned tabs as a named snapshot">
          Save snapshot
        </button>
      </div>
      <button id="undo" hidden></button>
      <button id="sync">Sync now</button>
      <div class="iorow">
        <button id="export" title="Download all sets and snapshots as a JSON backup">
          Export backup
        </button>
        <button id="import" title="Import a backup file — its sets become snapshots">
          Import backup
        </button>
        <input id="importfile" type="file" accept=".json,application/json" hidden />
      </div>
    </div>
    <footer>
      <div id="error" hidden></div>
      <div id="status"></div>
      <div id="quota"></div>
    </footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
